<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Safe Road Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Drone road safety monitor</p>
          <h1>Safe Road</h1>
        </div>
        <div class="actions">
          <button id="simulateBtn" type="button">Simulate Detection</button>
          <button id="refreshBtn" type="button" class="secondary">Refresh</button>
        </div>
      </section>

      <section class="status-grid" aria-label="System status">
        <article>
          <span>Total hazards</span>
          <strong id="totalCount">0</strong>
        </article>
        <article>
          <span>High severity</span>
          <strong id="highCount">0</strong>
        </article>
        <article>
          <span>Police alerts</span>
          <strong id="policeCount">0</strong>
        </article>
      </section>

      <section class="panel vision-panel">
        <div class="panel-heading">
          <h2>OpenCV Image Detection</h2>
          <p id="visionStatus">Ready</p>
        </div>
        <form id="visionForm" class="vision-form">
          <label>
            Road image
            <input id="imageInput" name="image" type="file" accept="image/*" required />
          </label>
          <label>
            Road name
            <input name="road" type="text" value="Drone road image" />
          </label>
          <label>
            Latitude
            <input name="latitude" type="number" step="0.000001" value="37.5665" />
          </label>
          <label>
            Longitude
            <input name="longitude" type="number" step="0.000001" value="126.9780" />
          </label>
          <button type="submit">Analyze Image</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Live Hazard Alerts</h2>
          <p id="lastUpdated">Waiting for data</p>
        </div>
        <div id="events" class="events"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
